<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Alberto García</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .banner-anuncio {
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Mi Sitio SEO</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Inicio</a>
                <a class="nav-link active" href="contacto.html">Contacto</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="banner-anuncio shadow-sm" onclick="alert('¡Has hecho clic en el anuncio de la práctica!')">
                    <h4 class="fw-bold">🚀 ¡Aprende SEO Avanzado hoy!</h4>
                    <p class="mb-0">Haz clic aquí para ver ofertas especiales en cursos de posicionamiento.</p>
                </div>

                <div class="card shadow border-0 p-4 mb-5" style="border-radius: 15px;">
                    <h1 class="text-center mb-4">Contacta conmigo</h1>
                    
                    <form>
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre completo</label>
                            <input type="text" class="form-control" id="nombre" placeholder="Tu nombre" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="mensaje" class="form-label">Mensaje</label>
                            <textarea class="form-control" id="mensaje" rows="4" placeholder="¿En qué puedo ayudarte?"></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill">Enviar mensaje</button>
                        </div>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="text-muted">También puedes encontrarme en:</p>
                        <a href="https://www.linkedin.com/in/tu-perfil" target="_blank" class="btn btn-outline-primary rounded-pill px-4">
                            <i class="bi bi-linkedin"></i> Mi LinkedIn Profesional
                        </a>
                    </div>
                </div>

                <div class="text-center mb-5">
                    <a href="index.html" class="text-decoration-none text-secondary">
                        <i class="bi bi-arrow-left"></i> Volver a la página principal
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log("Chatbot inicializado para la práctica de SEO.");
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
