<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5; url=https://albertogarcia92.github.io/">
    <title>Página no encontrada - 404</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .error-template { padding: 40px 15px; text-align: center; }
        .error-actions { margin-top: 15px; margin-bottom: 15px; }
        .error-actions .btn { margin-right: 10px; }
    </style>
</head>
<body class="bg-light d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 text-center">
                <div class="card shadow border-0 p-5" style="border-radius: 20px;">
                    <h1 class="display-1 fw-bold text-danger">404</h1>
                    <h2 class="mb-4">¡Vaya! Página no encontrada</h2>
                    <p class="lead text-muted mb-4">
                        Lo sentimos, la página que buscas no existe o ha sido movida. 
                        <br>
                        <strong>Serás redirigido al inicio automáticamente en unos segundos.</strong>
                    </p>
                    <div class="error-actions">
                        <a href="https://albertogarcia92.github.io/" class="btn btn-primary btn-lg rounded-pill px-4">
                            Volver al Inicio ahora
                        </a>
                    </div>
                    <div class="mt-4">
                        <div class="spinner-border text-primary spinner-border-sm" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
